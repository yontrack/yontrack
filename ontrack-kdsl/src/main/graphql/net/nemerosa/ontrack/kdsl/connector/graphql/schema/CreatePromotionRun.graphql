mutation CreatePromotionRun(
    $buildId: Int!,
    $promotion: String!,
    $description: String!,
    $dateTime: LocalDateTime,
    $fieldValues: [PromotionRunFieldValueInput!],
) {
    createPromotionRunById(input: {
        buildId: $buildId,
        promotion: $promotion,
        description: $description,
        dateTime: $dateTime,
        fieldValues: $fieldValues,
    }) {
        promotionRun {
            ...PromotionRunFragment
        }
        ...PayloadUserErrors
    }
}